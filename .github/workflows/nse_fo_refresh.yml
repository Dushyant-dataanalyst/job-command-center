name: NSE F&O Refresh — Every 5 Min Market Hours

on:
  schedule:
    # Every 5 min, Mon–Fri, 3:00–10:55 UTC = 8:30 AM–4:25 PM IST
    - cron: '*/5 3-10 * * 1-5'
  workflow_dispatch:   # Manual trigger from GitHub UI anytime

jobs:
  fo-refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # Allow pushing updated HTML back to repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1   # Shallow clone — faster

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --quiet yfinance pandas numpy requests

      - name: Run F&O refresh
        run: |
          cd nse-trading-bot
          python refresh_fo_cloud.py

      - name: Copy updated dashboard to Skills root
        run: |
          cp nse-trading-bot/results/nse_live_dashboard.html nse_live_dashboard.html || echo "No HTML to copy"
          cp nse-trading-bot/results/fo_latest.json fo_latest.json 2>/dev/null || true

      - name: Commit and push if changed
        run: |
          git config user.name  "NSE Bot"
          git config user.email "nse-bot@github-actions"
          git add nse_live_dashboard.html fo_latest.json 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No changes — skipping commit"
          else
            NOW=$(TZ='Asia/Kolkata' date '+%d %b %H:%M IST')
            git commit -m "chore: fo refresh ${NOW}"
            git pull --rebase origin master
            git push origin master
            echo "Deployed to Vercel via push"
          fi
