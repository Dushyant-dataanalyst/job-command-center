name: NSE FO Refresh Every 5 Min

on:
  schedule:
    - cron: '*/5 2-10 * * 1-5'   # Every 5 min, 07:30-16:25 IST (02:00-10:55 UTC)
    - cron: '30 15 * * 1-5'       # Once at 9:00 PM IST (15:30 UTC) — next-day prep
  workflow_dispatch:               # Manual trigger from GitHub UI — hit "Run workflow" any time to force a fresh pull

# cancel-in-progress was true until 02-Jul-2026 — reverted after finding it was
# likely the actual cause of near-zero commits that day. logs/run_history.json
# changes on every execution and forces a commit, so commit count == execution
# count; with only ~9-min job runtime possible (50-stock scan w/ retry backoff)
# against a 5-min trigger interval, cancel-in-progress:true meant almost every
# run got killed by the next tick before it ever reached the commit step. A
# queued run (this setting) can finish and commit even if a slower predecessor
# is still running; a genuinely hung run is still bounded by timeout-minutes below.
concurrency:
  group: nse-fo-refresh
  cancel-in-progress: false

jobs:
  fo-refresh:
    runs-on: ubuntu-latest
    # 8 min, not the tighter 3-4 min originally suggested — market_mood_refresh.py alone
    # checks ~50 stocks for breadth and sector_rotation_refresh.py adds ~20 more, each with
    # up to 35s of retry backoff on a failing ticker. A too-tight timeout would kill
    # legitimately-slow-but-working runs, which is the opposite of what this guards against.
    timeout-minutes: 8
    permissions:
      contents: write
    env:
      # Verified 04-Jul-2026 against a live token: Kite historical candles
      # match yfinance exactly on close/volume, indicators agree within
      # rounding noise (see market_data.py). Every call site still falls
      # back to yfinance automatically on any Kite failure (no session, no
      # token, network error) -- flip to "false" here to revert instantly,
      # no code change needed.
      USE_KITE_HISTORICAL: "true"

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install --quiet yfinance==1.4.1 pandas==2.2.3 numpy==2.1.2 requests==2.34.2

      - name: Run F&O refresh (writes fo_latest.json to repo root)
        id: fo_refresh
        continue-on-error: true
        run: |
          set -e
          cd nse-trading-bot
          python refresh_fo_cloud.py
          echo "✅ refresh_fo_cloud.py succeeded"
          echo "fo_latest.json preview:"
          cat ../fo_latest.json | python3 -c "
          import sys,json
          d=json.load(sys.stdin)
          for k,v in d.items():
              if k=='_meta': print(' meta:', v)
              elif isinstance(v,dict): print(f' {k}: {v.get(\"consensus\",\"?\")} spot={v.get(\"spot\",\"?\")} as_of={v.get(\"data_as_of\",\"?\")}')
          "

      - name: Run market regime detection (writes market_regime.json to repo root)
        id: market_regime
        continue-on-error: true
        run: |
          set -e
          cd nse-trading-bot
          python market_regime_refresh.py
          echo "✅ market_regime_refresh.py succeeded"

      - name: Run trading brain (paper-trades signals, marks open trades to market)
        id: trade_brain
        continue-on-error: true
        run: |
          set -e
          cd nse-trading-bot
          python trade_brain.py
          echo "✅ trade_brain.py succeeded"

      - name: Run sector rotation scan (writes sector_rotation.json to repo root)
        id: sector_rotation
        continue-on-error: true
        run: |
          set -e
          cd nse-trading-bot
          python sector_rotation_refresh.py
          echo "✅ sector_rotation_refresh.py succeeded"

      - name: Run market mood gauge (writes market_mood.json to repo root)
        id: market_mood
        continue-on-error: true
        run: |
          set -e
          cd nse-trading-bot
          python market_mood_refresh.py
          echo "✅ market_mood_refresh.py succeeded"

      - name: Run news/events tracker (writes news_feed.json to repo root)
        id: news_refresh
        continue-on-error: true
        run: |
          set -e
          cd nse-trading-bot
          python news_refresh.py
          echo "✅ news_refresh.py succeeded"

      - name: Run equity brain (writes equity_journal.json to repo root)
        id: equity_brain
        continue-on-error: true
        run: |
          set -e
          cd nse-trading-bot
          python equity_brain.py
          echo "✅ equity_brain.py succeeded"

      - name: Run stock F&O signals (writes stock_fo.json to repo root)
        id: stock_fo
        continue-on-error: true
        run: |
          set -e
          cd nse-trading-bot
          python stock_fo_refresh.py
          echo "✅ stock_fo_refresh.py succeeded"

      # Real Zerodha portfolio (holdings/positions/margin/trades) via Kite
      # Connect. Fails closed+graceful (writes session_live:false) when the
      # daily token isn't live, so this never blocks the run.
      - name: Run Kite portfolio sync (writes kite_portfolio.json to repo root)
        id: kite_portfolio
        continue-on-error: true
        run: |
          set -e
          cd nse-trading-bot
          python kite_portfolio_refresh.py
          echo "✅ kite_portfolio_refresh.py succeeded"

      # Must run BEFORE equity scan — equity_scan_core.py reads
      # voter_weights.json to weight its consensus scoring. Same once-daily
      # gating: weights only need recalculating once real trades have
      # actually closed since the last run, not every 5 minutes.
      - name: Recalculate per-voter weights (writes voter_weights.json to repo root)
        id: voter_weights
        if: github.event.schedule == '30 15 * * 1-5' || github.event_name == 'workflow_dispatch'
        continue-on-error: true
        run: |
          set -e
          cd nse-trading-bot
          python voter_weights_refresh.py
          echo "✅ voter_weights_refresh.py succeeded"

      # Once-daily only (9pm IST prep cron, or manual dispatch) — a 49-stock
      # multi-indicator + fundamentals scan is too heavy to repeat every
      # 5 minutes, and swing signals don't need that granularity.
      - name: Run equity scan (writes equity_scan.json to repo root)
        id: equity_scan
        if: github.event.schedule == '30 15 * * 1-5' || github.event_name == 'workflow_dispatch'
        continue-on-error: true
        run: |
          set -e
          cd nse-trading-bot
          python equity_scan_refresh.py
          echo "✅ equity_scan_refresh.py succeeded"

      # Same once-daily gating as equity scan — a snapshot is only useful
      # once the day's data has settled, not every 5 minutes.
      - name: Snapshot today's JSON files (writes snapshots/YYYY-MM-DD/)
        id: snapshot_daily
        if: github.event.schedule == '30 15 * * 1-5' || github.event_name == 'workflow_dispatch'
        continue-on-error: true
        run: |
          cd nse-trading-bot
          python snapshot_daily.py

      # Runs right before commit — catches a truncated/corrupted write from
      # any step above before it can ever reach git history. Loose validation
      # (parseable + right top-level shape), not a strict schema, since these
      # scripts' output shapes have changed multiple times already. A file
      # that fails gets restored from the last commit on origin, so a bad
      # write never overwrites the last known-good version.
      - name: Validate JSON outputs (restore last-good on corruption)
        id: validate_json
        if: always()
        continue-on-error: true
        run: |
          cd nse-trading-bot
          python validate_json_outputs.py

      - name: Record run outcome + notify on failure
        if: always()
        env:
          STEP_FO_REFRESH: ${{ steps.fo_refresh.outcome }}
          STEP_MARKET_REGIME: ${{ steps.market_regime.outcome }}
          STEP_TRADE_BRAIN: ${{ steps.trade_brain.outcome }}
          STEP_SECTOR_ROTATION: ${{ steps.sector_rotation.outcome }}
          STEP_MARKET_MOOD: ${{ steps.market_mood.outcome }}
          STEP_NEWS_REFRESH: ${{ steps.news_refresh.outcome }}
          STEP_EQUITY_BRAIN: ${{ steps.equity_brain.outcome }}
          STEP_STOCK_FO: ${{ steps.stock_fo.outcome }}
          STEP_KITE_PORTFOLIO: ${{ steps.kite_portfolio.outcome }}
          STEP_EQUITY_SCAN: ${{ steps.equity_scan.outcome }}
          STEP_VOTER_WEIGHTS: ${{ steps.voter_weights.outcome }}
          STEP_SNAPSHOT_DAILY: ${{ steps.snapshot_daily.outcome }}
          STEP_VALIDATE_JSON: ${{ steps.validate_json.outcome }}
          GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          cd nse-trading-bot
          python record_run_outcome.py

      - name: Commit updated JSON files if changed
        if: always()
        run: |
          # 41898282+github-actions[bot]@users.noreply.github.com is GitHub's
          # own official bot service-account identity (App ID 41898282) — a
          # real, recognized account, unlike the previous made-up
          # nse-bot@github-actions address that Vercel/GitHub couldn't match
          # to anyone ("Invalid git email address" warning in Vercel's UI).
          # Purely cosmetic either way — deployments always worked regardless.
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Fetch latest from origin — avoids conflict if laptop also pushed
          git fetch origin master
          git reset --mixed origin/master

          git add fo_latest.json trade_journal.json sector_rotation.json market_mood.json news_feed.json equity_journal.json stock_fo.json equity_scan.json equity_scan_history.json market_regime.json voter_weights.json kite_portfolio.json logs/run_history.json
          if [ -d snapshots ]; then git add snapshots/; fi

          if git diff --staged --quiet; then
            echo "no changes — no commit needed"
          else
            NOW=$(TZ='Asia/Kolkata' date '+%d %b %H:%M IST')
            git commit -m "chore: fo refresh + brain update ${NOW}"
            git push origin master
            echo "✅ Pushed — Vercel will redeploy"
          fi

      # Independent of GitHub Actions itself working — this is the whole point.
      # If the scheduled trigger silently stops firing (exactly what happened
      # earlier today), no ping arrives, and healthchecks.io alerts by email
      # on its own, without depending on anything in this repo/workflow.
      - name: Heartbeat ping (independent of GitHub Actions scheduling)
        if: always()
        run: |
          curl -fsS --retry 3 --max-time 10 "${{ secrets.HEALTHCHECK_PING_URL }}" > /dev/null || true
